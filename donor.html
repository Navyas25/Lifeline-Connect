<!DOCTYPE html>
<html>
<head>
<title>Donor Registration</title>

<link rel="stylesheet" href="form.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<a href="index.html" class="home-icon">
<i class="fa-solid fa-house"></i>
</a>

<div class="container">

<h1>Become a Donor</h1>
<h3>Donor Registration</h3>

<form id="donorForm">

<input type="radio" name="step" id="step1" checked>
<input type="radio" name="step" id="step2">
<input type="radio" name="step" id="step3">
<input type="radio" name="step" id="step4">

<!-- STEP 1 -->

<div class="form-step step1">

<input type="text" id="name" placeholder="Full Name" required>

<input type="number" id="age" placeholder="Age" min="18" max="65" required>

<label for="step2" class="btn">Next</label>

</div>

<!-- STEP 2 -->

<div class="form-step step2">

<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<select id="bloodGroup" required>
<option value="">Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<div class="btn-group">
<label for="step1" class="btn">Back</label>
<label for="step3" class="btn">Next</label>
</div>

</div>

<!-- STEP 3 -->

<div class="form-step step3">

<input type="number" id="height" placeholder="Height (cm)" required>

<input type="number" id="weight" placeholder="Weight (kg)" required>

<div class="btn-group">
<label for="step2" class="btn">Back</label>
<label for="step4" class="btn">Next</label>
</div>

</div>

<!-- STEP 4 -->

<div class="form-step step4">

<input type="text" id="city" placeholder="City" required>

<input type="tel" id="contact" placeholder="Contact Number" required>

<select id="disease">
<option value="">Any Disease / Health Issue?</option>
<option>No</option>
<option>Diabetes</option>
<option>Blood Pressure</option>
<option>Heart Disease</option>
<option>Other</option>
</select>

<input type="text" id="otherDisease" placeholder="If other disease, specify">

<div class="btn-group">

<label for="step3" class="btn">Back</label>

<button type="submit" class="btn">Register</button>

</div>

</div>

</form>

</div>

<script>

const form = document.getElementById("donorForm");

form.addEventListener("submit", async function(e){

e.preventDefault();

const donorData = {

name: document.getElementById("name").value,
age: document.getElementById("age").value,
gender: document.getElementById("gender").value,
bloodGroup: document.getElementById("bloodGroup").value,
height: document.getElementById("height").value,
weight: document.getElementById("weight").value,
city: document.getElementById("city").value,
contact: document.getElementById("contact").value,
disease: document.getElementById("disease").value,
otherDisease: document.getElementById("otherDisease").value

};

try{

const response = await fetch("http://localhost:5000/api/donors/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(donorData)

});

const data = await response.json();

alert(data.message);

form.reset();

document.getElementById("step1").checked = true;

}catch(error){

console.error(error);

alert("Server error. Try again.");

}

});

</script>

</body>
</html>
